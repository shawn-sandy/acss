name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR so we don't pay for stale duplicates.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache BOTH the monorepo root lockfile and the fpkit package lockfile
          # so a cache hit covers the whole install graph.
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            packages/fpkit/package-lock.json

      - name: Install root deps
        run: npm ci --no-audit --no-fund

      - name: Install fpkit deps
        run: npm ci --no-audit --no-fund
        working-directory: packages/fpkit

      - name: Lint
        run: npm run lint
        working-directory: packages/fpkit

      - name: Unit tests with coverage
        run: npm run test:coverage -- --run
        working-directory: packages/fpkit

      - name: Build package (for size-limit)
        # size-limit measures the built artifacts under libs/, which the
        # package step produces. Run it AFTER tests so a broken build still
        # surfaces test failures first.
        run: |
          npm run package
          npm run sass:build
        working-directory: packages/fpkit

      - name: Bundle-size budget
        run: npm run size
        working-directory: packages/fpkit

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: packages/fpkit/coverage/
          if-no-files-found: warn
          retention-days: 14
