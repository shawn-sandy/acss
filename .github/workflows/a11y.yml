name: Accessibility

# Runs @storybook/addon-a11y's axe checks against every story via the
# Storybook test-runner. Reports hard violations (color-contrast, missing
# labels, keyboard traps) as failing checks.
#
# NOTE: The first run after Phase 1's hex-literal cleanup + Phase 3's dark
# mode may surface genuine a11y issues that were masked by the old hardcoded
# colors. Treat the first N failures as a backlog to triage, not a regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y:
    name: Storybook a11y (axe)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Note: job-level continue-on-error keeps the workflow green overall,
    # but GitHub still reports THIS job's check_run conclusion from the
    # step outcomes. To avoid painting a red X on the PR page during the
    # initial triage pass, the actual test-runner step below carries its
    # own `continue-on-error`. Remove both when the backlog is drained.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            packages/acss/package-lock.json

      - name: Install deps
        run: |
          npm ci --no-audit --no-fund
          npm ci --no-audit --no-fund --prefix packages/acss

      - name: Install Playwright browsers
        # test-runner drives a real Chromium via Playwright. Full browser
        # install is ~100MB; matches Storybook's documented setup.
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook

      - name: Serve and run a11y tests
        # concurrently serves the built Storybook, waits for it, and runs the
        # test-runner against it. npx guards against the Storybook packages
        # being scoped to the monorepo root.
        #
        # Step-level continue-on-error makes the step's CONCLUSION report as
        # "success" even when the inner command exits non-zero, which is what
        # GitHub surfaces on the PR checks row. Job-level continue-on-error
        # only prevents cascading failure; it doesn't change per-job display.
        # Reviewers still see violation details in the step's log body.
        continue-on-error: true
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:a11y --prefix packages/acss"
